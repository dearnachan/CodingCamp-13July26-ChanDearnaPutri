<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ========== HEADER: Greeting + Clock ========== -->
  <header class="header">
    <!-- Theme toggle -->
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
      <span class="theme-icon" id="theme-icon">☀️</span>
    </button>

    <div class="clock-block">
      <p id="greeting" class="greeting">Good morning!</p>
      <h1 id="clock" class="clock">00:00:00</h1>
      <p id="date" class="date">Monday, January 1, 2025</p>
    </div>
  </header>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="dashboard">

    <!-- Focus Timer -->
    <section class="card" id="timer-section">
      <h2 class="card-title">Focus Timer</h2>
      <div class="timer-display" id="timer-display">25:00</div>
      <div class="timer-controls">
        <button class="btn btn-primary" id="timer-start">Start</button>
        <button class="btn btn-secondary" id="timer-stop">Stop</button>
        <button class="btn btn-ghost" id="timer-reset">Reset</button>
      </div>
      <p class="timer-label" id="timer-label">Stay focused. You've got this.</p>

      <!-- Custom duration -->
      <div class="timer-duration-row">
        <label for="timer-duration-input" class="duration-label">Set duration (min)</label>
        <div class="duration-controls">
          <input
            type="number"
            id="timer-duration-input"
            class="input input-sm"
            min="1"
            max="120"
            value="25"
            aria-label="Timer duration in minutes"
          />
          <button class="btn btn-ghost btn-sm" id="timer-duration-set">Set</button>
        </div>
      </div>
    </section>

    <!-- To-Do List -->
    <section class="card" id="todo-section">
      <div class="todo-header">
        <h2 class="card-title">To-Do List</h2>
        <!-- Sort controls -->
        <div class="sort-controls">
          <label for="sort-select" class="sr-only">Sort tasks</label>
          <select id="sort-select" class="select" aria-label="Sort tasks">
            <option value="default">Order added</option>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
            <option value="undone">Undone first</option>
            <option value="done">Done first</option>
          </select>
        </div>
      </div>

      <div class="todo-input-row">
        <input
          type="text"
          id="todo-input"
          class="input"
          placeholder="Add a new task..."
          maxlength="120"
        />
        <button class="btn btn-primary" id="todo-add">Add</button>
      </div>

      <ul class="todo-list" id="todo-list">
        <!-- Tasks injected by JS -->
      </ul>

      <p class="todo-empty" id="todo-empty">No tasks yet. Add one above!</p>
    </section>

    <!-- Quick Links -->
    <section class="card" id="links-section">
      <h2 class="card-title">Quick Links</h2>

      <div class="links-input-row">
        <input
          type="text"
          id="link-name"
          class="input"
          placeholder="Label (e.g. Gmail)"
          maxlength="30"
        />
        <input
          type="url"
          id="link-url"
          class="input"
          placeholder="URL (e.g. https://gmail.com)"
        />
        <button class="btn btn-primary" id="link-add">Add</button>
      </div>

      <div class="links-grid" id="links-grid">
        <!-- Links injected by JS -->
      </div>

      <p class="todo-empty" id="links-empty">No links yet. Add one above!</p>
    </section>

  </main>

  <!-- ========== EDIT TASK MODAL ========== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3 class="modal-title">Edit Task</h3>
      <input type="text" id="modal-input" class="input" maxlength="120" />
      <div class="modal-actions">
        <button class="btn btn-primary" id="modal-save">Save</button>
        <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
